name: Deploy to Railway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to Railway
      uses: railwayapp/railway-deploy-action@v1
      with:
        railway-token: ${{ secrets.RAILWAY_TOKEN }}
        service-name: vulnprobe